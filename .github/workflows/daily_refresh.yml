name: Daily Feed Refresh

on:
  schedule:
    - cron: "0 2 * * *"  # 7:30 AM IST daily
  workflow_dispatch:

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install feedparser requests
      - run: python fetch_feeds.py
      - name: Commit feed.json
        run: |
          git config user.name "AZA Feed Bot"
          git config user.email "bot@azafashions.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "chore: refresh feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
